name: Test Coverage

on:
  pull_request:
    branches:
      - main

jobs:
  test-coverage:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mnemosyne_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests with coverage
        run: >-
          dotnet test
          --collect:"XPlat Code Coverage"
          --DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'
          ConnectionStrings__DefaultConnection: 'Host=localhost;Database=mnemosyne_test;Username=postgres;Password=postgres'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/coverage.cobertura.xml
          flags: unittests,integrationtests
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx