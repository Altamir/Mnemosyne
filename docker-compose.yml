version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: mnemosyne-postgres
    environment:
      POSTGRES_DB: mnemosyne
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
